<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #28a745; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .error { color: #dc3545; margin-top: 15px; text-align: center; font-weight: bold; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        .result-table th, .result-table td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        .result-table th { background-color: #f8f9fa; width: 45%; color: #333; }
        .loader { text-align: center; display: none; font-style: italic; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Salary Detail Portal</h2>
    <div class="form-group">
        <label for="memberCode">Enter Member Code (ID):</label>
        <input type="text" id="memberCode" placeholder="Example: N-SHEM1230">
    </div>
    <button onclick="getSalaryDetails()">View Salary Details</button>
    
    <div id="loader" class="loader">Data dhoondha ja raha hai, kripya intezar karein...</div>
    <div id="errorMsg" class="error"></div>

    <table id="detailsTable" class="result-table">
        <thead>
            <tr>
                <th>Field Name</th>
                <th>Your Detail</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data yahan dynamic load hoga -->
        </tbody>
    </table>
</div>

<script>
    // ⚠️ APNA NEW DEPLOYED WEB APP URL YAHAN PASTE KAREN
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_Yi2GxNWI9OQuq8Daz76O-ob664fV4CXg8PviAOZMr-zIIYmPv28MRsBIaBLhzAdA/exec"; 

    async function getSalaryDetails() {
        const memberCode = document.getElementById('memberCode').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const table = document.getElementById('detailsTable');
        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');

        errorMsg.innerText = "";
        table.style.display = "none";
        tableBody.innerHTML = "";
        
        if(!memberCode) {
            errorMsg.innerText = "Kripya Member Code enter karein!";
            return;
        }

        loader.style.display = "block";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'text/plain' // Apps Script ke liye standard setup
                },
                body: JSON.stringify({ memberCode: memberCode })
            });

            const result = await response.json();
            loader.style.display = "none";

            if(result.status === "success") {
                table.style.display = "table";
                for (const [key, value] of Object.entries(result.data)) {
                    // Faltu un-named columns filter karne ke liye
                    if(key && !key.startsWith("Column_")) { 
                        const displayValue = (value !== null && value !== undefined && value !== "") ? value : '-';
                        const row = `<tr><th>${key}</th><td>${displayValue}</td></tr>`;
                        tableBody.innerHTML += row;
                    }
                }
            } else {
                errorMsg.innerText = result.message;
            }

        } catch (error) {
            loader.style.display = "none";
            errorMsg.innerText = "Connection Error! Ek baar check karein ki naya URL sahi hai ya nahi.";
            console.error("Error details:", error);
        }
    }
</script>
</body>
</html>
