
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Portal</title>
    <!-- Google Fonts & Icons for modern look -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .container { background: var(--card-bg); width: 100%; max-width: 700px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); padding: 32px; border: 1px solid var(--border); transition: all 0.3s ease; }
        
        /* Header Styling */
        .header { text-align: center; margin-bottom: 32px; }
        .header .logo-icon { font-size: 48px; color: var(--primary); margin-bottom: 8px; }
        .header h2 { font-size: 24px; font-weight: 700; color: var(--primary); }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        /* Form Controls */
        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .input-icon { position: absolute; left: 14px; color: var(--text-muted); font-size: 20px; }
        .input-wrapper input { width: 100%; padding: 14px 14px 14px 44px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; background-color: #f1f5f9; transition: all 0.2s ease; outline: none; }
        .input-wrapper input:focus { border-color: var(--primary-light); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }

        /* Button Setup */
        button.btn-search { width: 100%; padding: 14px; background: var(--primary); border: none; color: white; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s ease; }
        button.btn-search:hover { background: #172554; }

        /* Loader and Alerts */
        .loader { display: none; text-align: center; margin-top: 20px; color: var(--primary-light); font-weight: 500; font-size: 15px; }
        .loader-spinner { animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .error-alert { display: none; background: #fef2f2; border-left: 4px solid var(--error); padding: 14px; border-radius: 6px; color: #991b1b; font-weight: 500; margin-top: 20px; font-size: 14px; align-items: center; gap: 8px; }

        /* Results Display Layout */
        .dashboard-layout { display: none; margin-top: 32px; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .emp-badge { display: flex; align-items: center; gap: 12px; background: #eff6ff; padding: 16px; border-radius: 10px; margin-bottom: 24px; border: 1px solid #dbeafe; }
        .emp-badge .avatar { background: var(--primary); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .emp-badge-details h4 { font-size: 16px; font-weight: 700; color: var(--primary); }
        .emp-badge-details p { font-size: 13px; color: var(--text-muted); }

        .data-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .data-card { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #fafafa; border: 1px solid var(--border); border-radius: 8px; transition: background 0.2s; }
        .data-card:hover { background: #f1f5f9; }
        .data-label { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .data-value { font-size: 14px; color: var(--text-main); font-weight: 600; text-align: right; }

        /* Highlighting Specific Crucial Columns */
        .data-card.highlight { background: #f0fdf4; border-color: #bbf7d0; }
        .data-card.highlight .data-value { color: #166534; font-size: 16px; font-weight: 700; }

        /* Actions Bar */
        .actions-bar { margin-top: 24px; display: flex; justify-content: flex-end; }
        .btn-print { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; color: var(--text-muted); font-weight: 500; font-size: 14px; }
        .btn-print:hover { background: #f1f5f9; color: var(--text-main); }

        /* Responsive Layout breakpoint */
        @media(min-width: 480px) { .data-grid { grid-template-columns: repeat(2, 1fr); } .data-card { flex-direction: column; align-items: flex-start; gap: 8px; } .data-value { text-align: left; } }
        
        /* Print Stylesheet integration */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; }
            .form-group, .btn-search, .actions-bar { display: none !important; }
            .dashboard-layout { display: block !important; margin-top: 0; }
            .data-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header Block -->
    <div class="header">
        <span class="material-icons-round logo-icon">account_balance_wallet</span>
        <h2>Employee Salary Hub</h2>
        <p>Apna Member Code enter karke securely details check karein</p>
    </div>
    
    <!-- Input Section -->
    <div class="form-group">
        <label for="memberCode">Member Code (ID)</label>
        <div class="input-wrapper">
            <span class="material-icons-round input-icon">badge</span>
            <input type="text" id="memberCode" placeholder="Enter ID (e.g., N-SHEM1230)">
        </div>
    </div>
    
    <button class="btn-search" onclick="getSalaryDetails()">
        <span class="material-icons-round">search</span>
        View Dashboard
    </button>
    
    <!-- Loader Block -->
    <div id="loader" class="loader">
        <span class="material-icons-round loader-spinner">sync</span>Securely connecting to database...
    </div>
    
    <!-- Error Alert Banner -->
    <div id="errorAlert" class="error-alert">
        <span class="material-icons-round">error_outline</span>
        <span id="errorText"></span>
    </div>

    <!-- Output Dashboard Panel -->
    <div id="dashboard" class="dashboard-layout">
        <!-- Top Profile Card -->
        <div class="emp-badge">
            <div class="avatar" id="empInitials">EE</div>
            <div class="emp-badge-details">
                <h4 id="empName">Employee Name</h4>
                <p id="empMeta">Department | Position</p>
            </div>
        </div>

        <!-- Metric Cards Container -->
        <div class="data-grid" id="metricsGrid">
            <!-- Dynamic Data Blocks go here -->
        </div>

        <!-- Action Items (Print) -->
        <div class="actions-bar">
            <button class="btn-print" onclick="window.print()">
                <span class="material-icons-round">print</span>Print Statement
            </button>
        </div>
    </div>
</div>

<script>
    // ⚠️ APNA APPS SCRIPT WEB APP URL YAHAN DHAMAKE SE PASTE KAREN
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_Yi2GxNWI9OQuq8Daz76O-ob664fV4CXg8PviAOZMr-zIIYmPv28MRsBIaBLhzAdA/exec"; 

    async function getSalaryDetails() {
        const memberCode = document.getElementById('memberCode').value.trim();
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');
        const dashboard = document.getElementById('dashboard');
        const metricsGrid = document.getElementById('metricsGrid');
        const loader = document.getElementById('loader');

        // Reset App State Views
        errorAlert.style.display = "none";
        dashboard.style.display = "none";
        metricsGrid.innerHTML = "";
        
        if(!memberCode) {
            showError("Kripya valid Member Code fill up karein!");
            return;
        }

        loader.style.display = "block";

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ memberCode: memberCode })
            });

            const result = await response.json();
            loader.style.display = "none";

            if(result.status === "success") {
                renderDashboard(result.data);
            } else {
                showError(result.message);
            }

        } catch (error) {
            loader.style.display = "none";
            showError("Network error! Server se data sync nahi ho paya.");
            console.error(error);
        }
    }

    function showError(msg) {
        const errorAlert = document.getElementById('errorAlert');
        document.getElementById('errorText').innerText = msg;
        errorAlert.style.display = "flex";
    }

    function renderDashboard(data) {
        const metricsGrid = document.getElementById('metricsGrid');
        
        // Profiles details extraction
        const name = data["Member Name"] || "Employee";
        const dept = data["Department"] || "-";
        const pos = data["Position"] || "-";
        
        document.getElementById('empName').innerText = name;
        document.getElementById('empMeta').innerText = `${dept} • ${pos}`;
        document.getElementById('empInitials').innerText = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

        // Grid cards filling logic
        for (const [key, value] of Object.entries(data)) {
            // Unwanted system generated properties ignore
            if(!key || key.startsWith("Column_") || ["Member Name", "Department", "Position"].includes(key)) {
                continue;
            }

            const cleanValue = (value !== null && value !== undefined && value !== "") ? value : '-';
            
            // Checking if payment field or total fields to add green styling highlights
            const isHighlight = key.toLowerCase().includes('payment') || key.toLowerCase().includes('final') || key.toLowerCase().includes('gross');
            const highlightClass = isHighlight ? 'highlight' : '';

            const cardHtml = `
                <div class="data-card ${highlightClass}">
                    <span class="data-label">${key}</span>
                    <span class="data-value">${cleanValue}</span>
                </div>
            `;
            metricsGrid.innerHTML += cardHtml;
        }

        document.getElementById('dashboard').style.display = "block";
    }
</script>
</body>
</html>
